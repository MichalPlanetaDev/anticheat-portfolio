name: Docker CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docker-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t anticheat-portfolio .

      - name: Run Docker Compose demo
        run: docker compose run --rm demo

      - name: Verify exported report
        run: |
          test -f reports/suspicious-report.csv
          grep -q "player_id,sequence,kind,reason,observed_value,expected_limit" reports/suspicious-report.csv